spring.application.name=event-meal-plannerv2

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:./data/eventdb.sqlite
spring.datasource.driverClassName=org.sqlite.JDBC
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys = ON

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Anthropic API (for vendor-suggestion analyze flow)
# Set ANTHROPIC_API_KEY in your environment before starting the backend.
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-sonnet-4-6

# Allow larger multipart uploads for vendor CSVs
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
